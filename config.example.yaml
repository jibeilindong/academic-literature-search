# \u5b66\u672f\u6587\u732e\u68c0\u7d22\u6280\u80fd\u914d\u7f6e
# \u590d\u5236\u6b64\u6587\u4ef6\u4e3a config.yaml \u5e76\u4fee\u6539\u914d\u7f6e

# API\u914d\u7f6e
apis:
  semantic_scholar:
    enabled: true
    # \u7533\u8bf7API\u5bc6\u94a5: https://www.semanticscholar.org/product/api
    api_key: ""  # \u4ece\u73af\u5883\u53d8\u91cf SEMANTIC_SCHOLAR_API_KEY \u8bfb\u53d6
  
  crossref:
    enabled: true
    # \u5efa\u8bae\u63d0\u4f9b\u90ae\u7bb1\u4ee5\u793c\u8c8c\u4f7f\u7528
    email: "openclaw@example.com"  # \u4ece\u73af\u5883\u53d8\u91cf CROSSREF_API_EMAIL \u8bfb\u53d6
  
  pubmed:
    enabled: true
    # \u7533\u8bf7API\u5bc6\u94a5: https://www.ncbi.nlm.nih.gov/account/
    api_key: ""  # \u4ece\u73af\u5883\u53d8\u91cf PUBMED_API_KEY \u8bfb\u53d6
  
  arxiv:
    enabled: true

# \u68c0\u7d22\u914d\u7f6e
search:
  default_max_results: 50
  default_databases: ["semantic_scholar", "crossref"]
  timeout_per_database: 10
  max_total_results: 1000
  
  # \u6392\u5e8f\u914d\u7f6e
  sort_by: "relevance"  # relevance, citations, year, influential
  sort_order: "desc"    # asc, desc
  
  # \u8fc7\u6ee4\u914d\u7f6e
  default_filters:
    open_access_only: false
    min_citations: 0
    peer_reviewed_only: false

# \u7f13\u5b58\u914d\u7f6e
cache:
  enabled: true
  memory_cache_size: 1000
  memory_cache_ttl: 300    # 5\u5206\u949f
  disk_cache_size: 10000
  disk_cache_ttl: 3600     # 1\u5c0f\u65f6
  cache_dir: "~/.cache/openclaw/literature"

# \u8f93\u51fa\u914d\u7f6e
output:
  default_format: "markdown"
  auto_save: false
  save_directory: "./literature_search_results"
  
  # Markdown\u8f93\u51fa\u914d\u7f6e
  markdown:
    include_statistics: true
    include_abstract: true
    abstract_max_length: 200
    include_keywords: false
    include_links: true
  
  # CSV\u8f93\u51fa\u914d\u7f6e
  csv:
    encoding: "utf-8-sig"
    delimiter: ","
  
  # BibTeX\u8f93\u51fa\u914d\u7f6e
  bibtex:
    max_authors: 10
    include_abstract: false

# \u7f51\u7edc\u914d\u7f6e
network:
  timeout: 30
  max_retries: 3
  proxy: ""  # \u4ee3\u7406\u670d\u52a1\u5668\uff0c\u5982 http://proxy.example.com:8080
  user_agent: "OpenClawLiteratureSearch/2.0.0"

# \u9ad8\u7ea7\u529f\u80fd
advanced:
  query_expansion: true
  spell_check: true
  deduplication_level: "strict"  # none, basic, strict, aggressive
  
  # \u67e5\u8be2\u6269\u5c55\u914d\u7f6e
  query_expansion_options:
    use_wordnet: false
    use_acronyms: true
    use_related_terms: true

# \u76d1\u63a7\u914d\u7f6e
monitoring:
  enabled: true
  log_level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  log_file: "literature_search.log"
  performance_tracking: true